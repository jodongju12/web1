<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3-태그선택자 사용방법</title>
    <style>
        h1{
            color: red;
            background-color: orange;
        }
        p{
            color: blue;
            background-color: #000000;
        }

        #p1{
            color: white;
            background-color: black;
        }
    </style>
</head>
<body>
    <h1>한국폴리텍대학</h1>
    <h2>인공지능소프트웨어과</h2>
    <h1>웹프로그래밍기초</h1>
    <p id="p1">이 문장은 ID 선택자를 사용하여 스타일이 적용되었습니다.</p>
    <p>이 문장은 일반적인 p 태그 선택자로 스타일이 적용되었습니다.</p>
</body>
</html>
