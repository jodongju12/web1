<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Membership</title>
    <style>
        /* 1. 기본 배경 설정 (부드러운 그라데이션) */
        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 2. 폼 컨테이너 디자인 (유리창 느낌) */
        form {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 350px;
        }

        fieldset {
            border: none;
            padding: 0;
            margin: 0;
        }

        legend {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4a4a4a;
            margin-bottom: 25px;
            text-align: center;
            width: 100%;
        }

        /* 3. 입력창 스타일 */
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* 패딩 포함 크기 조절 */
            transition: 0.3s;
        }

        input[type="text"]:focus, input[type="email"]:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        /* 4. 버튼 디자인 (주짓수 블랙벨트급 간지) */
        input[type="submit"] {
            width: 100%;
            background: #667eea;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        input[type="reset"] {
            width: 100%;
            background: transparent;
            color: #888;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            text-decoration: underline;
        }

        /* 라벨 텍스트 스타일 */
        label {
            font-size: 0.9rem;
            color: #555;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <form action="01.html" method="get">
        <fieldset>
            <legend>새로운 도전자 등록</legend>
            
            <label>성명</label>
            <input type="text" name="name" placeholder="이름을 입력하세요">

            <label>이메일</label>
            <input type="email" name="email" placeholder="example@mail.com">

            <label>주소</label>
            <input type="text" name="addr" placeholder="거주 지역">

            <label>성별</label><br>
            <input type="radio" name="gender" value="남성"> 남성 &nbsp;
            <input type="radio" name="gender" value="여성"> 여성<br><br>

            <label>취미</label><br>
            <input type="checkbox" name="hobby1" value="주짓수"> 주짓수 &nbsp;
            <input type="checkbox" name="hobby2" value="코딩"> 코딩 &nbsp;
            <input type="checkbox" name="hobby3" value="탈출"> 탈출<br><br>

            <input type="submit" value="가입 완료">
            <input type="reset" value="다시 쓰기">
        </fieldset>
    </form>

</body>
</html>
